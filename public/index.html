<meta charset="utf-8">
<title>Tonight's Pick — Sulay & Tanya</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0d12">
<style>
  :root{
    --bg:#0b0d12; --bg2:#0f1219; --card:#151922; --card2:#1c212c; --line:#262c38;
    --text:#f3f0ea; --muted:#98a0b0; --faint:#68707f;
    --accent:#ffb14a; --accent2:#ff7a59; --accent-ink:#20140a;
    --good:#4ecb8b; --warn:#f0a94a; --bad:#ff6f70;
    --shadow:0 20px 40px -22px rgba(0,0,0,.75);
    --r:18px; --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme:light){
    :root{
      --bg:#f4efe5; --bg2:#efe9dc; --card:#ffffff; --card2:#f6f1e7; --line:#e7ddca;
      --text:#1a1c22; --muted:#5f6675; --faint:#97907f;
      --accent:#c9791a; --accent2:#d8552f; --accent-ink:#fff6e9;
      --good:#2c9d67; --warn:#bd7d1a; --bad:#cf4b4b;
      --shadow:0 20px 40px -24px rgba(70,52,20,.35);
    }
  }
  :root[data-theme="dark"]{
    --bg:#0b0d12; --bg2:#0f1219; --card:#151922; --card2:#1c212c; --line:#262c38;
    --text:#f3f0ea; --muted:#98a0b0; --faint:#68707f; --accent:#ffb14a; --accent2:#ff7a59; --accent-ink:#20140a;
    --good:#4ecb8b; --warn:#f0a94a; --bad:#ff6f70; --shadow:0 20px 40px -22px rgba(0,0,0,.75);
  }
  :root[data-theme="light"]{
    --bg:#f4efe5; --bg2:#efe9dc; --card:#ffffff; --card2:#f6f1e7; --line:#e7ddca;
    --text:#1a1c22; --muted:#5f6675; --faint:#97907f; --accent:#c9791a; --accent2:#d8552f; --accent-ink:#fff6e9;
    --good:#2c9d67; --warn:#bd7d1a; --bad:#cf4b4b; --shadow:0 20px 40px -24px rgba(70,52,20,.35);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; font-family:var(--sans); color:var(--text); line-height:1.5;
    background:radial-gradient(120% 60% at 80% -10%, color-mix(in srgb,var(--accent) 14%, transparent), transparent 55%), linear-gradient(var(--bg2), var(--bg));
    background-attachment:fixed; min-height:100dvh;
    padding-bottom:calc(96px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  .app{max-width:640px; margin:0 auto; padding:0 15px}
  .noscroll::-webkit-scrollbar{display:none}
  .noscroll{scrollbar-width:none; -ms-overflow-style:none}
  button{font-family:inherit}

  /* ---- header ---- */
  header{
    position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between;
    padding:12px 15px; margin:0 -15px 4px; gap:10px;
    background:color-mix(in srgb,var(--bg) 82%, transparent); backdrop-filter:blur(14px);
    border-bottom:1px solid color-mix(in srgb,var(--line) 60%, transparent);
    padding-top:calc(12px + env(safe-area-inset-top));
  }
  .logo{display:flex; align-items:center; gap:9px; min-width:0; flex:1 1 auto; overflow:hidden}
  .logo .dot{width:26px; height:26px; border-radius:8px; flex-shrink:0;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); display:grid; place-items:center; font-size:15px}
  .logo b{font-size:15px; letter-spacing:.04em; font-weight:750; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0}
  .logo span{color:var(--muted); font-weight:600}
  .hbtns{display:flex; gap:8px; flex-shrink:0}
  @media(max-width:380px){ .logo span{display:none} }
  .icon{width:38px; height:38px; border-radius:11px; border:1px solid var(--line); background:var(--card);
    color:var(--muted); font-size:16px; display:grid; place-items:center; cursor:pointer}
  .icon:active{transform:scale(.94)}

  /* ---- hero prompt ---- */
  .hero{padding:20px 2px 14px}
  .hero h1{margin:0; font-size:clamp(24px,7vw,32px); font-weight:800; letter-spacing:-.02em; line-height:1.08; text-wrap:balance}
  .hero h1 em{font-style:normal; background:linear-gradient(120deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; color:transparent}
  .hero p{margin:8px 0 0; color:var(--muted); font-size:14.5px}

  /* ---- mood grid ---- */
  .section-label{font-size:11px; text-transform:uppercase; letter-spacing:.16em; color:var(--faint); font-weight:800; margin:18px 2px 10px}
  .moods{display:grid; grid-template-columns:repeat(2,1fr); gap:10px}
  @media(min-width:480px){ .moods{grid-template-columns:repeat(4,1fr)} }
  .mood{
    display:flex; flex-direction:column; align-items:flex-start; gap:7px; min-height:74px;
    padding:13px; border-radius:15px; border:1px solid var(--line); background:var(--card);
    color:var(--text); cursor:pointer; text-align:left; transition:transform .12s, border-color .12s, background .12s;
  }
  .mood .emo{font-size:21px; line-height:1}
  .mood .lbl{font-size:13.5px; font-weight:650; letter-spacing:.01em}
  .mood:active{transform:scale(.97)}
  .mood[aria-pressed="true"]{
    border-color:transparent; color:var(--accent-ink);
    background:linear-gradient(135deg,var(--accent),var(--accent2)); box-shadow:0 10px 22px -12px color-mix(in srgb,var(--accent) 70%,transparent);
  }
  .mood[aria-pressed="true"] .lbl{font-weight:750}

  /* ---- quick + refine ---- */
  .quick{display:flex; gap:9px; margin-top:12px; flex-wrap:wrap}
  .qbtn{flex:1; min-width:120px; display:flex; align-items:center; justify-content:center; gap:7px;
    padding:12px; border-radius:13px; border:1px solid var(--line); background:var(--card); color:var(--text);
    font-size:14px; font-weight:650; cursor:pointer}
  .qbtn:active{transform:scale(.98)}
  .refine-toggle{margin:14px 2px 0; display:flex; align-items:center; gap:6px; background:none; border:none;
    color:var(--muted); font-size:13px; font-weight:650; cursor:pointer; padding:4px 0}
  .refine-toggle .chev{transition:transform .2s}
  .refine-toggle[aria-expanded="true"] .chev{transform:rotate(180deg)}
  .refine{overflow:hidden; max-height:0; transition:max-height .28s ease}
  .refine.open{max-height:660px}
  .refine-inner{padding:12px 0 2px; display:flex; flex-direction:column; gap:14px}
  .fgroup > label{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.13em; color:var(--faint); font-weight:800; margin-bottom:8px}
  .chips{display:flex; gap:7px; flex-wrap:wrap}
  .chip{padding:8px 13px; border-radius:999px; border:1px solid var(--line); background:var(--card); color:var(--muted);
    font-size:13px; cursor:pointer}
  .chip:active{transform:scale(.96)}
  .chip[aria-pressed="true"]{background:color-mix(in srgb,var(--accent) 16%, var(--card)); border-color:var(--accent); color:var(--text); font-weight:650}

  /* ---- results ---- */
  .results{margin-top:22px; display:flex; flex-direction:column; gap:14px}
  .eyebrow{display:flex; align-items:center; gap:10px; font-size:11px; text-transform:uppercase; letter-spacing:.16em; color:var(--accent); font-weight:800; margin:6px 2px 0}
  .eyebrow.alt{color:var(--faint)}
  .eyebrow::after{content:""; flex:1; height:1px; background:var(--line)}

  .rec{display:flex; gap:13px; padding:13px; border-radius:var(--r); border:1px solid var(--line); background:var(--card); position:relative}
  .rec.best{background:linear-gradient(180deg, color-mix(in srgb,var(--accent) 9%, var(--card)), var(--card)); border-color:color-mix(in srgb,var(--accent) 45%, var(--line)); box-shadow:var(--shadow)}
  .poster{position:relative; width:96px; flex-shrink:0; aspect-ratio:2/3; border-radius:12px; overflow:hidden;
    background:linear-gradient(150deg,var(--card2),color-mix(in srgb,var(--accent) 22%, var(--card2))); background-size:cover; background-position:center}
  .rec.best .poster{width:112px}
  .poster::after{content:attr(data-init); position:absolute; inset:0; display:grid; place-items:center; font-size:26px; font-weight:800; color:color-mix(in srgb,var(--text) 30%,transparent); letter-spacing:.02em}
  .poster.has::after{content:""}
  .matchbadge{position:absolute; top:6px; left:6px; z-index:2; font-family:var(--mono); font-size:11px; font-weight:700;
    color:var(--accent-ink); background:linear-gradient(135deg,var(--accent),var(--accent2)); padding:2px 7px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .matchbadge small{font-weight:600; opacity:.8}
  .poster .pimg{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .45s ease; z-index:1}
  .poster.has .pimg{opacity:1}
  .poster.shimmer::before{content:""; position:absolute; inset:0; z-index:1; background:linear-gradient(100deg, transparent 25%, color-mix(in srgb,var(--text) 10%, transparent) 45%, transparent 65%); background-size:220px 100%; animation:shim 1.15s linear infinite}
  @keyframes shim{0%{background-position:-140px 0}100%{background-position:260px 0}}

  .where{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:1px 0 1px}
  .platform-badge{font-weight:750; font-size:12.5px; color:#fff; padding:5px 11px; border-radius:9px; display:inline-flex; align-items:center; gap:5px; letter-spacing:.01em; background:#556; box-shadow:0 3px 10px -4px rgba(0,0,0,.5)}
  .platform-badge .tri{font-size:9px; opacity:.9}
  .platform-badge.netflix{background:#e50914}
  .platform-badge.prime{background:#0a9edb}
  .platform-badge.hotstar{background:linear-gradient(135deg,#2a6df4,#8b5cf6)}
  .platform-badge.apple{background:#141414; box-shadow:inset 0 0 0 1px #3a3a3a}
  .platform-badge.sony{background:#6c2bd9}
  .where .access-tag{font-weight:700; padding:5px 10px}

  .rbody{flex:1; min-width:0; display:flex; flex-direction:column; gap:9px}
  .rbody h3{margin:0; font-size:17px; font-weight:750; letter-spacing:-.01em; line-height:1.2}
  .rec.best .rbody h3{font-size:19px}
  .rmeta{display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; margin:0 -2px}
  .pill{flex-shrink:0; font-size:11.5px; padding:4px 9px; border-radius:8px; background:var(--card2); border:1px solid color-mix(in srgb,var(--line) 70%,transparent); color:var(--muted); white-space:nowrap; display:inline-flex; align-items:center; gap:4px}
  .pill b{color:var(--text); font-weight:700}
  .pill.sc{font-family:var(--mono)}
  .pill.dim{opacity:.72}
  .pill.plat{color:var(--text); font-weight:650}
  .pill.access-tag.included{color:var(--good); border-color:color-mix(in srgb,var(--good) 40%,var(--line))}
  .pill.access-tag.rent{color:var(--warn); border-color:color-mix(in srgb,var(--warn) 40%,var(--line))}
  .pill.access-tag.extra{color:var(--bad); border-color:color-mix(in srgb,var(--bad) 40%,var(--line))}
  .why{margin:0; font-size:13.5px; line-height:1.55; color:color-mix(in srgb,var(--text) 88%, var(--muted))}
  .why b{color:var(--accent); font-weight:650}
  .rec:not(.best) .why{display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden}
  .rec:not(.best) .why.exp{-webkit-line-clamp:unset}
  .morebtn{background:none; border:none; color:var(--accent); font-size:12.5px; font-weight:650; cursor:pointer; padding:0; margin-top:-4px; align-self:flex-start}
  .flag{margin:0; font-size:12px; line-height:1.45; display:flex; gap:6px; color:var(--muted)}
  .flag.warn{color:var(--warn)}
  .flag .k{flex-shrink:0}

  .ractions{display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-top:2px}
  .rbtn{font-size:12.5px; font-weight:650; padding:7px 11px; border-radius:9px; border:1px solid var(--line); background:var(--card2); color:var(--text); cursor:pointer}
  .rbtn:active{transform:scale(.96)}
  .rbtn.wl.on{color:var(--accent); border-color:var(--accent)}
  .rbtn.skip{color:var(--muted)}
  .vstat{font-size:10.5px; font-weight:700; letter-spacing:.02em; padding:3px 8px; border-radius:99px; border:1px solid var(--line); color:var(--faint); background:var(--card2); white-space:nowrap; margin-left:auto}
  .vstat.checking{color:var(--accent)}
  .vstat.live{color:var(--good); border-color:color-mix(in srgb,var(--good) 40%,var(--line))}
  .vlink{font-size:11.5px; color:var(--faint); text-decoration:none}

  .verdict{margin-top:4px; padding:16px 17px; border-radius:var(--r); background:linear-gradient(135deg, color-mix(in srgb,var(--accent) 16%,var(--card)), var(--card)); border:1px solid color-mix(in srgb,var(--accent) 40%,var(--line))}
  .verdict .vk{font-size:11px; text-transform:uppercase; letter-spacing:.16em; color:var(--accent); font-weight:800}
  .verdict strong{display:block; font-size:20px; margin:4px 0 5px; letter-spacing:-.01em}
  .verdict p{margin:0; color:var(--muted); font-size:13.5px}

  .empty{padding:34px 20px; text-align:center; color:var(--muted); font-size:14.5px; background:var(--card); border:1px dashed var(--line); border-radius:var(--r)}

  /* ---- dock ---- */
  .dock{position:fixed; left:0; right:0; bottom:0; z-index:30; display:none; padding:12px 15px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent, color-mix(in srgb,var(--bg) 92%, transparent) 22%)}
  .dock.show{display:block}
  .dock .inner{max-width:640px; margin:0 auto; width:100%; display:flex; gap:9px}
  .dbtn{height:50px; border-radius:14px; font-size:15px; font-weight:700; cursor:pointer; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; gap:8px; white-space:nowrap}
  .dbtn:active{transform:scale(.98)}
  .dbtn.primary{flex:1; color:var(--accent-ink); border-color:transparent; background:linear-gradient(135deg,var(--accent),var(--accent2)); box-shadow:0 12px 26px -12px color-mix(in srgb,var(--accent) 75%,transparent)}
  .dbtn.ghost{padding:0 16px; background:color-mix(in srgb,var(--card) 80%,transparent); backdrop-filter:blur(10px); color:var(--text)}

  /* ---- modals ---- */
  .overlay{position:fixed; inset:0; z-index:50; display:none; align-items:flex-end; justify-content:center; background:rgba(4,5,9,.6); backdrop-filter:blur(3px)}
  @media(min-width:560px){ .overlay{align-items:center} }
  .overlay.show{display:flex}
  .sheet{width:100%; max-width:560px; max-height:88dvh; overflow:auto; background:var(--card); border:1px solid var(--line);
    border-radius:22px 22px 0 0; padding:20px 18px calc(24px + env(safe-area-inset-bottom)); box-shadow:var(--shadow)}
  @media(min-width:560px){ .sheet{border-radius:22px} }
  .sheet .grab{width:38px; height:4px; border-radius:99px; background:var(--line); margin:0 auto 14px}
  .sheet h3{margin:0 0 3px; font-size:19px}
  .sheet .msub{color:var(--muted); font-size:13px; margin-bottom:16px}
  .rate{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:14px}
  .rate .who{flex:1 1 140px}
  .rate label{display:flex; justify-content:space-between; font-size:13px; font-weight:650; color:var(--muted)}
  .rate label .v{font-family:var(--mono); color:var(--accent); font-weight:800; font-size:15px}
  .rate input[type=range]{width:100%; accent-color:var(--accent); margin-top:10px; height:26px}
  .sheet textarea{width:100%; background:var(--card2); border:1px solid var(--line); border-radius:12px; color:var(--text); font:inherit; font-size:14px; padding:11px; resize:vertical; min-height:56px}
  .mrow{display:flex; gap:9px; margin-top:16px}
  .mrow .btn{flex:1; height:48px; border-radius:13px; font-size:15px; font-weight:700; cursor:pointer; border:1px solid var(--line); background:var(--card2); color:var(--text)}
  .mrow .btn.primary{color:var(--accent-ink); border-color:transparent; background:linear-gradient(135deg,var(--accent),var(--accent2))}
  .listcol h4{margin:16px 0 8px; font-size:12px; text-transform:uppercase; letter-spacing:.12em; color:var(--faint); display:flex; align-items:center; gap:8px}
  .listcol h4 .c{font-family:var(--mono); background:var(--card2); border-radius:99px; padding:1px 8px; font-size:11px; color:var(--muted)}
  .listcol ul{list-style:none; margin:0; padding:0; display:flex; flex-wrap:wrap; gap:6px}
  .listcol li{font-size:12.5px; background:var(--card2); border:1px solid var(--line); border-radius:8px; padding:5px 10px; color:var(--muted); display:flex; gap:8px; align-items:center}
  .listcol li .sc{font-family:var(--mono); color:var(--accent)}
  .listcol li .x{cursor:pointer; color:var(--faint); font-weight:800}

  /* very small phones + foldables */
  @media(max-width:360px){
    .app{padding:0 12px}
    .hero{padding:16px 2px 10px}
    .poster{width:82px} .rec.best .poster{width:96px}
    .mood{padding:12px 11px; min-height:66px}
    .mood .emo{font-size:19px} .mood .lbl{font-size:12.5px}
    .rec{padding:11px; gap:11px}
    .dbtn{font-size:14px}
    .qbtn{min-width:0}
  }
  /* landscape phones: let the sticky header shrink so content shows */
  @media(max-height:460px) and (orientation:landscape){
    header{position:static}
    .hero{padding:14px 2px 8px}
  }
  /* large screens: keep it an app column, comfortably centred */
  @media(min-width:900px){ .app{max-width:680px} }
  img{max-width:100%}
  @media (prefers-reduced-motion:reduce){*{transition:none!important; animation:none!important}}
  a{color:var(--accent)}
</style>

<div class="app">
  <header>
    <div class="logo">
      <span class="dot">🍿</span>
      <b>Tonight's Pick <span>· S&amp;T</span></b>
    </div>
    <div class="hbtns">
      <button class="icon" id="openLists" type="button" aria-label="Your lists">☰</button>
      <button class="icon" id="themeBtn" type="button" aria-label="Toggle theme">◐</button>
    </div>
  </header>

  <div class="hero">
    <h1>What are we <em>watching</em> tonight?</h1>
    <p>Tap a mood — you'll get three picks and one clear winner in a second.</p>
  </div>

  <div class="section-label">Pick a mood</div>
  <div class="moods" id="moods">
    <button class="mood" data-mood="surprise" type="button" aria-pressed="false"><span class="emo">🎲</span><span class="lbl">Surprise us</span></button>
    <button class="mood" data-mood="funny" type="button" aria-pressed="false"><span class="emo">😂</span><span class="lbl">Funny &amp; easy</span></button>
    <button class="mood" data-mood="thriller" type="button" aria-pressed="false"><span class="emo">🕵️</span><span class="lbl">Thriller / spy</span></button>
    <button class="mood" data-mood="mystery" type="button" aria-pressed="false"><span class="emo">🔍</span><span class="lbl">Mystery</span></button>
    <button class="mood" data-mood="action" type="button" aria-pressed="false"><span class="emo">💥</span><span class="lbl">Action</span></button>
    <button class="mood" data-mood="warm" type="button" aria-pressed="false"><span class="emo">☕</span><span class="lbl">Feel-good</span></button>
    <button class="mood" data-mood="glossy" type="button" aria-pressed="false"><span class="emo">✨</span><span class="lbl">Escapism</span></button>
    <button class="mood" data-mood="crime" type="button" aria-pressed="false"><span class="emo">🎭</span><span class="lbl">Crime</span></button>
  </div>

  <div class="quick">
    <button class="qbtn" id="roulette" type="button">🎲 Roulette</button>
    <button class="qbtn" id="emergency" type="button">🚨 Emergency pick</button>
  </div>

  <button class="refine-toggle" id="refineToggle" type="button" aria-expanded="false">
    Refine <span style="color:var(--faint)">— format, length, energy, language</span> <span class="chev">▾</span>
  </button>
  <div class="refine" id="refine">
    <div class="refine-inner">
      <div class="fgroup">
        <label>Format</label>
        <div class="chips" data-group="format">
          <button class="chip" data-val="either" aria-pressed="true" type="button">Either</button>
          <button class="chip" data-val="movie" aria-pressed="false" type="button">🎬 Movie</button>
          <button class="chip" data-val="series" aria-pressed="false" type="button">📺 Show</button>
        </div>
      </div>
      <div class="fgroup">
        <label>Length</label>
        <div class="chips" data-group="commitment">
          <button class="chip" data-val="any" aria-pressed="true" type="button">Any</button>
          <button class="chip" data-val="short" aria-pressed="false" type="button">&lt;100-min film</button>
          <button class="chip" data-val="movie" aria-pressed="false" type="button">Any film</button>
          <button class="chip" data-val="ep25" aria-pressed="false" type="button">25–35-min eps</button>
          <button class="chip" data-val="ep45" aria-pressed="false" type="button">45–60-min eps</button>
          <button class="chip" data-val="limited" aria-pressed="false" type="button">Limited series</button>
          <button class="chip" data-val="binge" aria-pressed="false" type="button">Multi-season</button>
        </div>
      </div>
      <div class="fgroup">
        <label>Energy</label>
        <div class="chips" data-group="energy">
          <button class="chip" data-val="any" aria-pressed="true" type="button">Any</button>
          <button class="chip" data-val="background" aria-pressed="false" type="button">Background</button>

    if(mode==="roulette"){ scored.sort(function(){ return Math.random()-0.5; }); }
    else { scored.sort(function(a,b){ return b.s-a.s; }); }
    if(scored.length<3 && mode==="normal"){
      var have={}; scored.forEach(function(x){have[x.t.id]=1;});
      C.filter(function(t){return !isWatched(t)&&!sessionExcluded[t.id]&&!have[t.id];})
       .map(function(t){return {t:t,s:score(t)};}).sort(function(a,b){return b.s-a.s;})
       .forEach(function(x){ if(scored.length<3) scored.push(x); });
    }
    current = scored.slice(0,3);
    hasRun = true;
    render();
  }

  function el(h){ var d=document.createElement("div"); d.innerHTML=h.trim(); return d.firstChild; }
  function jw(t){ return "https://www.justwatch.com/in/search?q="+encodeURIComponent(t.title); }
  function accClass(a){ return a==="Included"?"included":(a==="Rent or buy"?"rent":"extra"); }
  function platformClass(p){ p=(p||"").toLowerCase();
    if(p.indexOf("netflix")>=0) return "netflix";
    if(p.indexOf("prime")>=0||p.indexOf("amazon")>=0) return "prime";
    if(p.indexOf("hotstar")>=0||p.indexOf("jio")>=0) return "hotstar";
    if(p.indexOf("apple")>=0) return "apple";
    if(p.indexOf("sony")>=0) return "sony";
    return "other"; }
  function liveGet(id){ if(liveCache[id]) return liveCache[id]; var c=LS.get("sp_live",{}),e=c[id]; if(e&&(Date.now()-e._t)<6048e5){ liveCache[id]=e; return e; } return null; }
  function liveSet(id,d){ liveCache[id]=d; var c=LS.get("sp_live",{}); c[id]=Object.assign({_t:Date.now()},d); LS.set("sp_live",c); }
  function rtShort(v){ return v==null?"NR":v+"%"; }
  function initials(s){ return s.replace(/[^A-Za-z0-9 ]/g,"").split(/\s+/).slice(0,2).map(function(w){return w[0]||"";}).join("").toUpperCase(); }

  function cardHTML(x, best){
    var t=x.t, inWl=!!watchlist()[t.title];
    var warnHTML = t.warn ? '<p class="flag warn"><span class="k">⚠</span><span>'+t.warn+'</span></p>' : '';
    var drawHTML = (best && t.drawback) ? '<p class="flag"><span class="k">•</span><span>'+t.drawback+'</span></p>' : '';
    return ''+
    '<article class="rec'+(best?' best':'')+'" data-id="'+t.id+'">'+
      '<div class="poster shimmer" data-poster data-init="'+initials(t.title)+'">'+
        '<img class="pimg" alt="" loading="lazy">'+
        '<span class="matchbadge">'+x.s+'<small>%</small></span>'+
      '</div>'+
      '<div class="rbody">'+
        '<h3>'+t.title+'</h3>'+
        '<div class="where">'+
          '<span class="platform-badge '+platformClass(t.platform)+'" data-plat><span class="tri">▶</span> <span class="platform-val">'+t.platform+'</span></span>'+
          '<span class="pill access-tag '+accClass(t.access)+'" data-acc>'+t.access+'</span>'+
        '</div>'+
        '<div class="rmeta noscroll">'+
          '<span class="pill sc"><b>IMDb</b> <span class="imdb-val">'+(t.imdb!=null?t.imdb:"–")+'</span></span>'+
          '<span class="pill sc"><b>RT</b> <span class="rtc-val">'+rtShort(t.rtC)+'</span></span>'+
          '<span class="pill sc dim"><b>Aud</b> '+rtShort(t.rtA)+'≈</span>'+
          '<span class="pill">'+(t.format==="movie"?"🎬 ":"📺 ")+t.eps+'</span>'+
          '<span class="pill">'+t.pace+'</span>'+
        '</div>'+
        '<p class="why">'+t.why+'</p>'+
        (best?'':'<button class="morebtn" type="button">Read more</button>')+
        warnHTML + drawHTML +
        '<div class="ractions">'+
          '<button class="rbtn watched" data-id="'+t.id+'" type="button">✓ Seen it</button>'+
          '<button class="rbtn wl'+(inWl?" on":"")+'" data-id="'+t.id+'" type="button">'+(inWl?"✓ Listed":"＋ List")+'</button>'+
          '<button class="rbtn skip notthis" data-id="'+t.id+'" type="button">✕ Skip</button>'+
          '<span class="vstat" data-status>Curated</span>'+
        '</div>'+
        '<a class="vlink" href="'+jw(t)+'" target="_blank" rel="noopener">Check on JustWatch India ↗</a>'+
      '</div>'+
    '</article>';
  }

  function render(){
    var R=document.getElementById("results");
    R.innerHTML="";
    document.getElementById("dock").classList.add("show");
    if(!current.length){
      R.appendChild(el('<div class="empty">Nothing unwatched matches that exact combo. Loosen a filter or tap <b>Emergency pick</b>.</div>'));
      return;
    }
    var head = mode==="emergency" ? "Emergency picks" : mode==="roulette" ? "Roulette — three spun up" : "Best pick tonight";
    R.appendChild(el('<div class="eyebrow">'+head+'</div>'));
    current.forEach(function(x,i){
      if(i===1) R.appendChild(el('<div class="eyebrow alt">Also tonight</div>'));
      R.appendChild(el(cardHTML(x, i===0)));
    });
    var win=current[0].t;
    var line = win.format==="movie" ? "the easiest press-play win for this mood." : "it lands your mood with the least effort and the strongest hook to keep you both watching.";
    R.appendChild(el('<div class="verdict"><span class="vk">Start with</span><strong>'+win.title+'</strong><p>Simply put — '+line+'</p></div>'));
    wireCards();
    current.forEach(function(x){ verifyCard(x.t); });
    R.scrollIntoView({behavior:"smooth", block:"start"});
  }

  function byId(id){ for(var i=0;i<C.length;i++) if(C[i].id===id) return C[i]; return null; }

  function wireCards(){
    document.querySelectorAll(".notthis").forEach(function(b){ b.onclick=function(){ sessionExcluded[b.dataset.id]=1; recommend(); }; });
    document.querySelectorAll(".rbtn.wl").forEach(function(b){
      b.onclick=function(){ var t=byId(b.dataset.id), wl=watchlist();
        if(wl[t.title]) delete wl[t.title]; else wl[t.title]={platform:t.platform};
        LS.set("sp_watchlist",wl); b.classList.toggle("on"); b.textContent=wl[t.title]?"✓ Listed":"＋ List"; };
    });
    document.querySelectorAll(".rbtn.watched").forEach(function(b){ b.onclick=function(){ openWatched(byId(b.dataset.id)); }; });
    document.querySelectorAll(".morebtn").forEach(function(b){
      b.onclick=function(){ var w=b.previousElementSibling; w.classList.toggle("exp"); b.textContent=w.classList.contains("exp")?"Read less":"Read more"; };
    });
  }

  function applyLive(root, d, st){
    if(d.imdb!=null) root.querySelector('.imdb-val').textContent=d.imdb;
    if(d.rtCritics!=null) root.querySelector('.rtc-val').textContent=d.rtCritics+"%";
    if(d.platform){ var pb=root.querySelector('[data-plat]'); if(pb){ pb.className='platform-badge '+platformClass(d.platform); root.querySelector('.platform-val').textContent=d.platform; } }
    if(d.access){ var a=root.querySelector('[data-acc]'); if(a){ a.className='pill access-tag '+accClass(d.access); a.textContent=d.access; } }
    var p=root.querySelector('[data-poster]');
    if(d.poster && p){ var img=p.querySelector('.pimg');
      img.onload=function(){ p.classList.add('has'); p.classList.remove('shimmer'); };
      img.onerror=function(){ p.classList.remove('shimmer'); };
      img.src=d.poster;
    } else if(p){ p.classList.remove('shimmer'); }
    st.textContent='● Live'; st.className='vstat live';
  }
  function verifyCard(t){
    var root=document.querySelector('.rec[data-id="'+t.id+'"]'); if(!root) return;
    var st=root.querySelector('[data-status]');
    var cached=liveGet(t.id);
    if(cached){ applyLive(root, cached, st); return; }
    st.textContent='Checking…'; st.className='vstat checking';
    fetch(API+"?title="+encodeURIComponent(t.title)+"&type="+t.format+(YEARS[t.id]?"&year="+YEARS[t.id]:""))
      .then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .then(function(d){ if(!d||d.error) throw 0; liveSet(t.id,d); applyLive(root,d,st); })
      .catch(function(){ st.textContent='Curated'; st.className='vstat'; var p=root.querySelector('[data-poster]'); if(p) p.classList.remove('shimmer'); });
  }

  // watched sheet
  var pendingWatched=null;
  function openWatched(t){
    pendingWatched=t;
    document.getElementById("wmSub").textContent=t.title;
    document.getElementById("sRate").value=7; document.getElementById("sVal").textContent="7";
    document.getElementById("tRate").value=7; document.getElementById("tVal").textContent="7";
    document.getElementById("wmReason").value="";
    document.getElementById("watchedOverlay").classList.add("show");
  }
  function saveWatched(liked){
    if(!pendingWatched) return;
    var rec={ s:+document.getElementById("sRate").value, t:+document.getElementById("tRate").value, r:document.getElementById("wmReason").value.trim() };
    var key=liked?"sp_liked":"sp_disliked"; var m=LS.get(key,{}); m[pendingWatched.title]=rec; LS.set(key,m);
    var wl=watchlist(); if(wl[pendingWatched.title]){ delete wl[pendingWatched.title]; LS.set("sp_watchlist",wl); }
    document.getElementById("watchedOverlay").classList.remove("show"); pendingWatched=null; recommend();
  }
  document.getElementById("sRate").oninput=function(){ document.getElementById("sVal").textContent=this.value; };
  document.getElementById("tRate").oninput=function(){ document.getElementById("tVal").textContent=this.value; };
  document.getElementById("wmLiked").onclick=function(){ saveWatched(true); };
  document.getElementById("wmDisliked").onclick=function(){ saveWatched(false); };

  // lists sheet
  function renderLists(){
    var body=document.getElementById("listBody"), liked=userLiked(), dis=userDisliked(), wl=watchlist();
    function block(title,obj,key,sc){
      var keys=Object.keys(obj), h='<h4>'+title+' <span class="c">'+keys.length+'</span></h4><ul>';
      if(!keys.length) h+='<li style="color:var(--faint)">Nothing yet</li>';
      keys.forEach(function(n){ var s=sc&&obj[n]&&obj[n].s!=null?'<span class="sc">'+obj[n].s+"/"+obj[n].t+'</span>':'';
        h+='<li>'+n+s+' <span class="x" data-k="'+key+'" data-n="'+encodeURIComponent(n)+'">✕</span></li>'; });
      return h+'</ul>';
    }
    body.innerHTML = block("Watched &amp; liked",liked,"sp_liked",true)+block("Watched &amp; disliked",dis,"sp_disliked",true)+
      block("Watchlist",wl,"sp_watchlist",false)+
      '<h4>Seeded favourites <span class="c">'+LIKED_SEED.length+'</span></h4><ul>'+LIKED_SEED.map(function(n){return '<li style="opacity:.65">'+n+'</li>';}).join("")+'</ul>';
    body.querySelectorAll(".x").forEach(function(x){ x.onclick=function(){ var m=LS.get(x.dataset.k,{}); delete m[decodeURIComponent(x.dataset.n)]; LS.set(x.dataset.k,m); renderLists(); }; });
  }

  // wiring
  document.getElementById("moods").addEventListener("click",function(e){
    var b=e.target.closest(".mood"); if(!b) return;
    document.querySelectorAll(".mood").forEach(function(m){ m.setAttribute("aria-pressed", m===b?"true":"false"); });
    sel.mood=b.dataset.mood; mode="normal"; recommend();
  });
  document.querySelectorAll(".chips").forEach(function(g){
    g.addEventListener("click",function(e){
      var b=e.target.closest(".chip"); if(!b) return;
      g.querySelectorAll(".chip").forEach(function(c){ c.setAttribute("aria-pressed", c===b?"true":"false"); });
      sel[g.dataset.group]=b.dataset.val; mode="normal"; if(hasRun) recommend();
    });
  });
  document.getElementById("roulette").onclick=function(){ mode="roulette"; recommend(); };
  document.getElementById("emergency").onclick=function(){ mode="emergency"; recommend(); };
  document.getElementById("reshuffle").onclick=function(){ current.forEach(function(x){ sessionExcluded[x.t.id]=1; }); recommend(); };
  document.getElementById("toTop").onclick=function(){ window.scrollTo({top:0,behavior:"smooth"}); };
  var rtog=document.getElementById("refineToggle");
  rtog.onclick=function(){ var open=document.getElementById("refine").classList.toggle("open"); rtog.setAttribute("aria-expanded", open?"true":"false"); };

  document.getElementById("openLists").onclick=function(){ renderLists(); document.getElementById("listsOverlay").classList.add("show"); };
  [ "watchedOverlay","listsOverlay" ].forEach(function(id){
    var o=document.getElementById(id);
    o.addEventListener("click",function(e){ if(e.target===o){ o.classList.remove("show"); if(id==="listsOverlay") recommend(); } });
  });

  // theme
  var root=document.documentElement, savedT=LS.get("sp_theme",null);
  if(savedT) root.setAttribute("data-theme",savedT);
  document.getElementById("themeBtn").onclick=function(){
    var cur=root.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
    var next=cur==="dark"?"light":"dark"; root.setAttribute("data-theme",next); LS.set("sp_theme",next);
    document.querySelector('meta[name=theme-color]').setAttribute("content", next==="dark"?"#0b0d12":"#f4efe5");
  };
})();
</script>
